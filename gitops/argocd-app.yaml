apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crm-mlops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/enesgulerai/crm-mlops.git
    targetRevision: main
    path: crm-mlops-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true