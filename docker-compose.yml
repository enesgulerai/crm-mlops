version: '3.8'

services:
  # 1. Service: API
  api:
    build: .
    container_name: churn_api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always

  # 2. Service: Redis 
  redis:
    image: redis:alpine
    container_name: churn_redis
    ports:
      - "6379:6379"
    restart: always