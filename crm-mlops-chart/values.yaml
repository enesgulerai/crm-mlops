redis:
  replicaCount: 1
  image:
    repository: redis
    tag: alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379

api:
  replicaCount: 2
  image:
    repository: crm-mlops-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8000
    type: ClusterIP
    nodePort: 30001
  env:
    redisHost: "redis"
    redisTimeout: "5.0"
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

ui:
  replicaCount: 1
  image:
    repository: crm-mlops-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8501
    type: NodePort
    nodePort: 30000
  env:
    apiUrl: "http://api:8000"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"