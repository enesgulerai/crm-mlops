---
# API DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  labels:
    app: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
          env:
            - name: REDIS_HOST
              value: {{ .Values.api.env.redisHost | quote }}
            - name: REDIS_TIMEOUT
              value: {{ .Values.api.env.redisTimeout | quote }}
          resources:
            requests:
              memory: {{ .Values.api.resources.requests.memory | quote }}
              cpu: {{ .Values.api.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.api.resources.limits.memory | quote }}
              cpu: {{ .Values.api.resources.limits.cpu | quote }}

---
# API SERVICE
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app: api
  ports:
    - protocol: TCP
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.port }}